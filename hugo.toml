# ============================================
# Hugo Site Configuration
# Developer Portfolio & Technical Blog
# ============================================

baseURL = "https://devopsinfo.in/"
language = "en-us"
title = " Home"


# Output Formats
[outputs]
home = ["HTML"]
section = ["HTML", "RSS"]
page = ["HTML"]

# Markup Configuration
[markup.goldmark.renderer]
unsafe = true

# URL Structure
[permalinks]
posts = "/:slug/"

# Main Navigation Menu
[[menu.main]]
name = "Home"
url = "/"
weight = 1

[[menu.main]]
name = "Posts"
url = "/posts/"
weight = 2

[[menu.main]]
name = "Resume"
url = "/resume/"
weight = 3

[[menu.main]]
name = "Findings"
url = "/findings/"
weight = 4

# Site Parameters
[params]
author = "Devopsinfo"
description = "A developer's portfolio and technical blog"
keywords = "developer, portfolio, devops, tech, blog"

# Social Media Links
[params.social]
github = "https://github.com/m4nihere"
linkedin = "https://linkedin.com/in/manish-kumar-mourya"
#twitter = "https://twitter.com/yourusername"
email = "[EMAIL_ADDRESS]"

# Analytics Configuration
[params.analytics]                                      
#googleAnalyticsID = "UA-XXXXXXXXX-X"
enableComments = false

# SEO Configuration
[params.seo]
siteName = "Your Portfolio"
siteImage = "/images/og-image.png"

# Resume Configuration
[params.resume]
downloadURL = "/resume.pdf"
downloadText = "Download Resume"

# Design Configuration
[params.design]
fontFamily = "JetBrains Mono, Fira Code, Roboto Mono, monospace"
accentColor = "#000000"
backgroundColor = "#ffffffff"
textColor = "#000000"
