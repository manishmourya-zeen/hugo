<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang | default "en" }}" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ .Site.Params.description }}">
    <meta name="keywords" content="{{ .Site.Params.keywords }}">
    <meta name="author" content="{{ .Site.Params.author }}">
    <meta name="color-scheme" content="dark light">

    <!-- Prevent flash: apply saved theme before render -->
    <script>
    (function(){var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark');document.documentElement.setAttribute('data-theme',t);})();
    </script>

    <!-- Open Graph / SEO -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="{{ .Title | default .Site.Title }}">
    <meta property="og:description" content="{{ .Summary | plainify | truncate 160 }}">
    <meta property="og:image" content="{{ .Site.BaseURL }}{{ .Site.Params.seo.siteImage | default "og-image.png" }}">
    <meta property="og:url" content="{{ .Permalink }}">
    <meta name="twitter:card" content="summary_large_image">

    <title>{{ .Title | default .Site.Title }} | {{ .Site.Params.author }}</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" fetchpriority="low">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="/css/style.css" type="text/css" media="all">

    <!-- Google Analytics -->
    {{ if .Site.Params.analytics.googleAnalyticsID }}
    <script async src="https://www.googletagmanager.com/gtag/js?id={{ .Site.Params.analytics.googleAnalyticsID }}"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', '{{ .Site.Params.analytics.googleAnalyticsID }}');
    </script>
    {{ end }}
</head>
<body>
    <!-- Trailing cursor -->
    <div class="cursor-dot" id="cursorDot"></div>
    <div class="cursor-ring" id="cursorRing"></div>

    {{ partial "header.html" . }}

    <main id="main" class="container" role="main">
        {{ block "main" . }}{{ end }}
    </main>

    {{ partial "footer.html" . }}

    <!-- Theme toggle script -->
    <script>
    (function() {
        var toggle = document.getElementById('themeToggle');
        if (toggle) {
            toggle.addEventListener('click', function() {
                var html = document.documentElement;
                var current = html.getAttribute('data-theme');
                var next = current === 'dark' ? 'light' : 'dark';
                html.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
            });
        }

        var menuToggle = document.getElementById('menuToggle');
        var navMenu = document.querySelector('.nav-menu');
        if (menuToggle && navMenu) {
            menuToggle.addEventListener('click', function() {
                navMenu.classList.toggle('is-active');
            });
        }
    })();
    </script>

    <!-- Cursor trail script -->
    <script>
    (function() {
        if (window.matchMedia('(pointer: coarse)').matches) return;
        var dot = document.getElementById('cursorDot');
        var ring = document.getElementById('cursorRing');
        var mouseX = -100, mouseY = -100;
        var ringX = -100, ringY = -100;
        var isVisible = false;

        document.addEventListener('mousemove', function(e) {
            mouseX = e.clientX;
            mouseY = e.clientY;
            dot.style.transform = 'translate(' + mouseX + 'px, ' + mouseY + 'px)';
            if (!isVisible) {
                dot.style.opacity = '1';
                ring.style.opacity = '1';
                isVisible = true;
            }
        });

        function animateRing() {
            ringX += (mouseX - ringX) * 0.15;
            ringY += (mouseY - ringY) * 0.15;
            ring.style.transform = 'translate(' + ringX + 'px, ' + ringY + 'px)';
            requestAnimationFrame(animateRing);
        }
        animateRing();

        document.querySelectorAll('a, button, .post-card, .social-icon-link, .tag, .tag-link').forEach(function(el) {
            el.addEventListener('mouseenter', function() {
                ring.classList.add('cursor-hover');
                dot.classList.add('cursor-hover');
            });
            el.addEventListener('mouseleave', function() {
                ring.classList.remove('cursor-hover');
                dot.classList.remove('cursor-hover');
            });
        });

        document.addEventListener('mouseleave', function() {
            dot.style.opacity = '0';
            ring.style.opacity = '0';
            isVisible = false;
        });
    })();
    </script>
</body>
</html>
