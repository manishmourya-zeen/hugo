<header class="header">
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="/">{{ .Site.Params.author }}</a>
            </div>
            
            <ul class="nav-menu">
                {{ range .Site.Menus.main }}
                <li class="nav-item">
                    <a href="{{ .URL }}" class="nav-link">
                        {{ .Name }}
                    </a>
                </li>
                {{ end }}
            </ul>
            
            <div class="nav-social">
                {{ if .Site.Params.social.github }}
                <a href="{{ .Site.Params.social.github }}" target="_blank" rel="noopener" title="GitHub">GH</a>
                {{ end }}
                {{ if .Site.Params.social.linkedin }}
                <a href="{{ .Site.Params.social.linkedin }}" target="_blank" rel="noopener" title="LinkedIn">LI</a>
                {{ end }}
                {{ if .Site.Params.social.twitter }}
                <a href="{{ .Site.Params.social.twitter }}" target="_blank" rel="noopener" title="Twitter">TW</a>
                {{ end }}
            </div>
        </div>
    </nav>
</header>
